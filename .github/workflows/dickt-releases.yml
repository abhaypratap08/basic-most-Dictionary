name: Build Dickt Release --- test phase

on:
  release:
    types: [created]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download org.json library
        run: |
          mkdir -p lib
          curl -L -o lib/json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      - name: Compile and package JAR
        run: |
          javac -cp ".:lib/json.jar" Dickt.java
          cat > manifest.txt << EOF
          Main-Class: Dickt
          Class-Path: json.jar
          EOF
          jar cvfm Dickt.jar manifest.txt Dickt.class

      - name: Prepare input folder
        run: |
          mkdir -p input
          mv Dickt.jar input/
          cp lib/json.jar input/json.jar

      - name: Build Linux AppImage + .deb
        run: |
          jpackage \
            --type app-image \
            --input input \
            --main-jar Dickt.jar \
            --main-class Dickt \
            --name Dickt \
            --dest releases/linux \
            --app-version ${{ github.event.release.tag_name }} \
            --description "A sleek floating dictionary widget" \
            --vendor "abhaypratap" \
            --linux-app-category Utility

          jpackage \
            --type deb \
            --input input \
            --main-jar Dickt.jar \
            --main-class Dickt \
            --name Dickt \
            --dest releases/linux \
            --app-version ${{ github.event.release.tag_name }} \
            --description "A sleek floating dictionary widget" \
            --vendor "abhaypratap" \
            --linux-app-category Utility

      - name: Create single-file .AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool releases/linux/Dickt Dickt.AppImage
          mv Dickt.AppImage releases/linux/

      - name: Upload Linux assets to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            releases/linux/Dickt.AppImage
            releases/linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download org.json library
        run: |
          mkdir lib
          curl -L -o lib/json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      - name: Compile and package JAR
        shell: bash
        run: |
          javac -cp ".:lib/json.jar" Dickt.java
          cat > manifest.txt << EOF
          Main-Class: Dickt
          Class-Path: json.jar
          EOF
          jar cvfm Dickt.jar manifest.txt Dickt.class

      - name: Prepare input folder
        run: |
          mkdir input
          mv Dickt.jar input/
          cp lib/json.jar input/json.jar

      - name: Build Windows .exe installer
        run: |
          jpackage `
            --type exe `
            --input input `
            --main-jar Dickt.jar `
            --main-class Dickt `
            --name Dickt `
            --dest releases/windows `
            --app-version ${{ github.event.release.tag_name }} `
            --description "A sleek floating dictionary widget" `
            --vendor "abhaypratap" `
            --win-dir-chooser

      - name: Upload Windows .exe to Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/windows/Dickt*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download org.json library
        run: |
          mkdir -p lib
          curl -L -o lib/json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      - name: Compile and package JAR
        run: |
          javac -cp ".:lib/json.jar" Dickt.java
          cat > manifest.txt << EOF
          Main-Class: Dickt
          Class-Path: json.jar
          EOF
          jar cvfm Dickt.jar manifest.txt Dickt.class

      - name: Prepare input folder
        run: |
          mkdir -p input
          mv Dickt.jar input/
          cp lib/json.jar input/json.jar

      - name: Build macOS .dmg
        run: |
          jpackage \
            --type dmg \
            --input input \
            --main-jar Dickt.jar \
            --main-class Dickt \
            --name Dickt \
            --dest releases/macos \
            --app-version ${{ github.event.release.tag_name }} \
            --description "A sleek floating dictionary widget" \
            --vendor "abhaypratap" \
            --mac-package-name Dickt

      - name: Upload macOS .dmg to Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/macos/Dickt*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
