build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JSON lib
        shell: bash
        run: |
          mkdir -p lib
          curl -L -o lib/json.jar https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar

      - name: Compile
        shell: bash
        run: javac -cp ".:lib/json.jar" Dickt.java

      - name: Create manifest
        shell: bash
        run: |
          echo "Main-Class: Dickt" > manifest.txt
          echo "Class-Path: json.jar" >> manifest.txt

      - name: Package JAR
        shell: bash
        run: jar cvfm Dickt.jar manifest.txt Dickt.class

      - name: Prepare input
        shell: bash
        run: |
          mkdir -p input
          mv Dickt.jar input/
          cp lib/json.jar input/json.jar

      - name: Build Windows EXE
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --input input ^
            --main-jar Dickt.jar ^
            --main-class Dickt ^
            --name Dickt ^
            --dest releases\windows ^
            --app-version 1.0 ^
            --win-dir-chooser ^
            --vendor "Abhaypratap08"

      - name: Upload Windows asset
        uses: softprops/action-gh-release@v2
        with:
          files: releases/windows/Dickt*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
